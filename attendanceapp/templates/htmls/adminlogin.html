{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="main-container">

    <div class="overlay">

        <div class="login-box">

            <h2>ADMIN<br>LOGIN</h2>

            <h3 class="error-message">

                {{data}}

            </h3>

            <form action="/adminloginAction" method="post">

                {% csrf_token %}

                <input type="text"
                       name="username"
                       placeholder="Enter Username"
                       required>

                <input type="password"
                       name="password"
                       placeholder="Enter Password"
                       required>

                <div class="login-buttons">

                    <button type="submit">

                        Login

                    </button>

                </div>

            </form>

            <div class="home-link">

                <span class="home-text">

                    Click here to go

                </span>

                <a href="/login.html">

                    Back

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
