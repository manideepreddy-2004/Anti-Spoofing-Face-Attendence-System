{% load static %}

<!DOCTYPE html>
<html>

<head>

    <title>Delete User</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

<div class="main-container">

    <div class="overlay">

        <div class="login-box">

            <h2>DELETE USER</h2>

            <h3 style="color:lightgreen;">

                {{data}}

            </h3>

            <form action="/deleteuserAction"
                  method="post">

                {% csrf_token %}

                <input type="text"
                       name="personid"
                       placeholder="Enter ID"
                       required>

                <div class="login-buttons">

                    <button type="submit">

                        Delete User

                    </button>

                </div>

            </form>

            <div class="home-link">

                <span class="home-text">

                    Click here to go

                </span>

                <a href="/adminhome.html">

                    Admin Home

                </a>

            </div>

        </div>

    </div>

</div>

</body>

</html>
